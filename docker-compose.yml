version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: backend-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: universal_backend
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d universal_backend"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis/redis-stack:latest
    container_name: backend-redis
    ports:
      - "6379:6379"
      - "8001:8001"
    networks:
      - backend-network

  nats:
    image: nats:latest
    container_name: backend-nats
    command: ["-js"]
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - backend-network

  minio:
    image: minio/minio
    container_name: backend-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - backend-network

  backend-engine:
    build: .
    container_name: backend-engine
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://admin:password@postgres:5432/universal_backend
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      MINIO_URL: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend-network

networks:
  backend-network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
