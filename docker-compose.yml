version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: universal_backend
    ports:
      - "5432:5432"

  nats:
    image: nats:latest
    command: "-js"
    ports:
      - "4222:4222"
      - "8222:8222"

  gateway:
    build: 
      context: .
      dockerfile: crates/gateway/Dockerfile
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/universal_backend
      NATS_URL: nats://nats:4222
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - nats

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      - gateway
